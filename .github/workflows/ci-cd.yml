# ───────────────────────────────────────────────────────────
# CI/CD Pipeline — Microservicio de Gestión de Tareas
# Flujo: Test → SonarCloud → Docker Build & Push → Deploy
# ───────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/microservicio-tareas
  SONAR_PROJECT_KEY: gferrufino_MicroservicioColaborativo

jobs:
  # ── Job 1: Tests unitarios ─────────────────────────────
  test:
    name: 🧪 Tests Unitarios
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Ejecutar tests con cobertura
        run: |
          pytest test_app.py -v --tb=short --cov=app --cov-report=xml:coverage.xml --cov-report=html:htmlcov --cov-report=term-missing --cov-fail-under=80

      - name: 📤 Subir reporte de cobertura (XML para SonarCloud)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: 📤 Subir reporte HTML de cobertura (equivalente a JaCoCo)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-report
          path: htmlcov/

  # ── Job 2: Análisis de calidad con SonarCloud ─────────
  sonarcloud:
    name: 🔍 SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para análisis de SonarCloud

      - name: 📥 Descargar reporte de cobertura
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: 🔍 Ejecutar SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Job 3: Build y Push de imagen Docker ───────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, sonarcloud]
    if: github.event_name == 'push'

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🔑 Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔍 Verificar imagen publicada
        run: |
          echo "✅ Imagen publicada: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          echo "✅ Imagen publicada: ${{ env.DOCKER_IMAGE }}:latest"

  # ── Job 4: Deploy a EC2 ────────────────────────────────
  deploy:
    name: 🚀 Deploy a EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🚀 Deploy vía SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "🔄 Iniciando deploy..."

            # ── Verificar/instalar Docker Compose ──
            if docker compose version > /dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
              echo "✅ Docker Compose plugin detectado"
            elif docker-compose --version > /dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
              echo "✅ Docker Compose standalone detectado"
            else
              echo "📦 Instalando Docker Compose plugin..."
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              COMPOSE_CMD="docker compose"
              echo "✅ Docker Compose instalado: $(docker compose version)"
            fi

            # ── Preparar directorio del proyecto ──
            PROJECT_DIR="$HOME/microservicio-tareas"
            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"
            echo "📁 Directorio actual: $(pwd)"

            # ── Actualizar código ──
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/gferrufino/MicroservicioColaborativo.git .
            fi

            # ── Verificar que docker-compose.yml existe ──
            echo "📋 Archivos en el directorio:"
            ls -la docker-compose.yml || { echo "❌ docker-compose.yml NO encontrado"; exit 1; }

            # ── Login a Docker Hub ──
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

            # ── Pull de la última imagen ──
            docker pull ${{ secrets.DOCKER_USERNAME }}/microservicio-tareas:latest

            # ── Detener servicios anteriores ──
            $COMPOSE_CMD -f docker-compose.yml down --remove-orphans 2>/dev/null || true

            # ── Exportar variables para docker-compose.yml ──
            export DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/microservicio-tareas
            export TAG=latest

            # ── Levantar servicios ──
            $COMPOSE_CMD -f docker-compose.yml up -d --no-build

            # ── Esperar arranque ──
            echo "⏳ Esperando que los servicios arranquen..."
            sleep 15

            # ── Diagnóstico ──
            echo "📋 Estado de los contenedores:"
            $COMPOSE_CMD -f docker-compose.yml ps

            echo "📋 Logs recientes de la app:"
            $COMPOSE_CMD -f docker-compose.yml logs --tail=20 app

            # ── Verificar health check ──
            echo "🏥 Verificando health check..."
            curl -sf http://localhost:5000/health && echo "" && echo "✅ Health check exitoso" || echo "⚠️ Health check falló"

            echo "✅ Deploy completado"

      - name: ✅ Verificación post-deploy
        run: |
          echo "🎉 Deploy a EC2 completado"
          echo "📊 Commit: ${{ github.sha }}"
          echo "📅 Fecha: $(date -u)"
