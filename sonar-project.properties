# ── Configuración de SonarCloud ──────────────────────────
# Documentación: https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

sonar.projectKey=mvtnight_MicroservicioColaborativo
sonar.organization=mvtnight
sonar.projectName=MicroservicioColaborativo

# Fuentes y exclusiones
sonar.sources=.
sonar.inclusions=**/*.py
sonar.exclusions=**/test_*.py,**/__pycache__/**,**/venv/**

# Tests
sonar.tests=.
sonar.test.inclusions=**/test_*.py

# Cobertura de código
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
